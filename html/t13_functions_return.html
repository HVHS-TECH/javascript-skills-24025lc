<!DOCTYPE html>
<html lang="en">

<head>
  <title>T13-functions return</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- stylesheets *******************************************-->
  <link rel="stylesheet" href="../css/style.css">
  <link rel="icon" type="image/png" href="../assets/dtec_favicon.png">
</head>

<body>
  <h1>T13-functions with return values</h1>
  <p>Open the console <code>(Ctrl-shift-i)</code> to see the messages.</p>

  <!-- Wrapped inputs completely inside the form so Enter key submission works -->
  <form id="formContainer" onsubmit="checkAffordability(event)">
    <p>
      <label for="ageField">Age:</label>
      <input type="number" id="ageField" placeholder="e.g. 16">
    </p>
    <p>
      <label for="moneyField">Pocket Money ($):</label>
      <input type="number" id="moneyField" step="0.01" placeholder="e.g. 15.00">
    </p>
    <button type="submit">Submit</button>
  </form>

  <br>

  <!-- Output container for JavaScript injection -->
  <div id="spaceForJavaScriptOutput">
    The output of your script will go here.
  </div>

  <script src="../t13_functions_return.js" defer></script>

</body>

</html>
