<!DOCTYPE html>
<html lang="en">

<head>
  <title>T18-validation</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- stylesheets *******************************************-->
  <link rel="stylesheet" href="../css/style.css">
  <link rel="icon" type="image/png" href="../assets/dtec_favicon.png">
</head>

<!--*************************************************************
  BODY
**************************************************************-->

<body>
  <h1>T18-validation</h1>
  <p>Open the console <code>(Ctrl-shift-i)</code> to see the messages.</p>

  <!-- Form remains bound to addItemToList() which naturally handles the Enter key -->
  <form class="form-container" onsubmit="event.preventDefault(); addItemToList();" novalidate>
    <label for="itemField">Enter an item to add to your list:</label><br>
    
    <!-- HTML Restrictions: required, minimum length of 1, and pattern requiring non-numbers -->
    <input 
      type="text" 
      id="itemField" 
      placeholder="e.g., Milk, Bread, Apples"
      required
      minlength="1"
      pattern=".*[a-zA-Z\s\W]+.*"
      title="Item name must contain text characters, not just numbers."
    >
    <br><br>

    <!-- The submit type processes the form when clicking OR pressing Enter -->
    <input type="submit" value="Add Item">
    <input type="button" value="Display Shopping List" onclick="displayShoppingList()">
  </form>
  <br>

  <div id="spaceForJavaScriptOutput"></div>

  <script src="../t16_arrays_continued.js"></script>

</body>

</html>
<!--*************************************************************
  END OF T18_Validation.HTML
**************************************************************-->
