<!DOCTYPE html>
<html lang="en">

<head>
  <title>T18-validation</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- stylesheets *******************************************-->
  <link rel="stylesheet" href="../css/style.css">
  <link rel="icon" type="image/png" href="../assets/dtec_favicon.png">
</head>

<!--*************************************************************
  BODY
**************************************************************-->

<body>
  <h1>T18-validation</h1>
  <p>Open the console <code>(Ctrl-shift-i)</code> to see the messages.</p>

  <!-- Changed from a <div> to a <form> with onsubmit prevention -->
  <form class="form-container" onsubmit="event.preventDefault(); addItemToList();">
    <label for="itemField">Enter an item to add to your list:</label><br>
    <input type="text" id="itemField" placeholder="e.g., Milk, Bread, Apples">
    <br><br>

    <!-- Changed first input type to "submit" so the Enter key triggers it -->
    <input type="submit" value="Add Item">
    <input type="button" value="Display Shopping List" onclick="displayShoppingList()">
  </form>
  <br>

  <div id="spaceForJavaScriptOutput">

   
  </div>


  <script src="../t16_arrays_continued.js"></script>

</body>

</html>
