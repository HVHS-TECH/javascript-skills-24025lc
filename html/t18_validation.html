<body>
  <h1>T18-validation</h1>
  <p>Open the console <code>(Ctrl-shift-i)</code> to see the messages.</p>

  

  <br>

  <!-- Task 18 Form Interface -->
  <h2>Task 18: Shopping List</h2>
  <form id="shoppingForm" onsubmit="return false;">
    <label for="itemField">Shopping Item Name:</label>
    <!-- Mandatory text field with a pattern that prevents entering spaces alone -->
    <input type="text" id="itemField" required pattern=".*\S+.*">
    <button type="button" onclick="addItemToList()">Add Item</button>
    <button type="button" onclick="displayShoppingList()">View List</button>
  </form>

  <br><br>

  <div id="spaceForJavaScriptOutput">

    The output of your script will go here.

  </div>


  <script src="../t18_validation.js"></script>

</body>
