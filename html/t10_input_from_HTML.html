<!DOCTYPE html>
<html lang="en">
<head>
  <title>T10-input from HTML</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="icon" type="image/png" href="../assets/dtec_favicon.png">
</head>
<body>

  <h1>T10-input from HTML</h1>
  <p>Open the console <code>(Ctrl-shift-i)</code> to see the messages.</p>

  <!-- Form wrapping ensures the Enter key triggers submission naturally -->
  <form id="formContainer" onsubmit="getFormInput(event)">
    <label for="nameField">Enter your name: </label>
    <input type="text" id="nameField" placeholder="Type name here...">
    <button type="submit">Submit</button>
  </form>

  <div id="spaceForJavaScriptOutput"></div>

  <!-- Added 'defer' to ensure HTML loads completely before the script runs -->
  <script src="../t10_input_from_HTML.js" defer></script>

</body>
</html>
