<!DOCTYPE html>
<html lang="en">

<head>
  <title>T11-data types</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- stylesheets *******************************************-->
  <link rel="stylesheet" href="../css/style.css">
  <link rel="icon" type="image/png" href="../assets/dtec_favicon.png">
</head>

<body>
  <h1>T11-data types</h1>
  <p>Open the console <code>(Ctrl-shift-i)</code> to see the messages.</p>

  <!-- Changed div to form and added onsubmit event to handle the Enter key -->
  <form id="formContainer" onsubmit="handleUserData(event)">
    <p>
      <label for="ageField">Enter your age: </label>
      <input type="number" id="ageField" placeholder="e.g. 16">
    </p>
    
    <p>
      <label for="moneyField">Enter pocket money ($): </label>
      <input type="number" step="0.01" id="moneyField" placeholder="e.g. 12.50">
    </p>
    
    <button type="submit">Submit Data</button>
  </form>

  <div id="spaceForJavaScriptOutput"></div>

  <!-- Added defer to guarantee elements load before script execution -->
  <script src="../t11_data_types.js" defer></script>

</body>

</html>
